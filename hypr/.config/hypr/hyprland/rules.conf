
##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = walls-selector

    match:class = walls-selector

    float = yes
    stay_focused = yes
    center = yes
    pin = yes

    max_size = 1580 660
    min_size = 1580 660
}

windowrule {
    name = amnezia-center

    match:class = AmneziaVPN

    center = yes
}
