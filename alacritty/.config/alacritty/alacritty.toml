[window]
padding = { x = 10, y = 10 }
decorations = "None"
opacity = 0.65

[font]
normal = { family = "JetBrainsMono Nerd Font Mono", style = "regular" }
size = 14

[colors.primary]
background = "#000000"

[cursor]
style = { shape = "Beam", blinking = "Always" }
thickness = 0.15

blink_interval = 750
blink_timeout = 5

unfocused_hollow = false
